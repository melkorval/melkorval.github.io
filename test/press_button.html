<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key and Touch Event Detection</title>
    <!--See test in the link: https://melkorval.github.io/test/press_button.html-->
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #actionArea {
            width: 300px;
            height: 300px;
            border: 2px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="actionArea">Tap or Press a Key</div>
    <script>
        // Function to handle both key press and touch events
        //The function verifies what event was performed 
        //whether it was a key press or a touch of the screen
        //and displays a message about it.
        function handleEvent(event) {
            //If the event is a key
            if (event.type === 'keydown') {
                alert('Key pressed: ' + event.key);
            } 
            
            //If the event is to tap the screen
            else if (event.type === 'touchstart') {
                alert('Screen touched');
            }
        }

        // Adding event listener for key press
        //This line of code add an event listener to the entire 
        //window for key presses. When any key is pressed, the
        //"handleEvent" function is called.
        window.addEventListener('keydown', handleEvent);

        // Adding event listener for touch
        //the HTML div element is selected by its id "actionArea" and then the event
        //occurs is selected.
        document.getElementById('actionArea').addEventListener('touchstart', handleEvent);
    </script>
</body>
</html>
